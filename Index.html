<style>

/* =========================
   BOTÕES PADRÃO
========================= */

.music-btn{
    min-width: 85px;
    height: 45px;

    border: none;
    outline: none;

    border-radius: 999px;

    background: var(--bg-btn);
    color: var(--text-color);

    font-size: 0.95rem;
    font-weight: 500;

    cursor: pointer;

    transition: 
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease;

    box-shadow:
    0 4px 12px var(--shadow);
}

/* HOVER */

.music-btn:hover{
    background: var(--bg-btn-hover);
    transform: scale(1.05);
}

/* CLICK */

.music-btn:active{
    transform: scale(0.96);
}

/* =========================
   PLAY BUTTON
========================= */

#playBtn{
    width: 68px;
    height: 68px;

    border: none;
    border-radius: 50%;

    background: white;
    color: black;

    font-size: 1rem;
    font-weight: bold;

    cursor: pointer;

    transition:
    transform 0.18s ease,
    box-shadow 0.18s ease;

    box-shadow:
    0 6px 18px rgba(255,255,255,0.25);
}

/* HOVER */

#playBtn:hover{
    transform: scale(1.08);
}

/* CLICK */

#playBtn:active{
    transform: scale(0.94);
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

    .player-controls{
        gap: 0.7rem;
    }

    .music-btn{
        min-width: 72px;
        height: 42px;

        font-size: 0.82rem;
    }

    #playBtn{
        width: 60px;
        height: 60px;

        font-size: 0.9rem;
    }

}


</style>

<style>
  body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
}

/* Estrutura */
.screen {
  display: none;
  padding: 20px;
}

.screen.active {
  display: block;
}

/* HOME */
.cards {
  display: flex;
  gap: 15px;
}

.card {
  width: 150px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

/* PLAYER */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cover-container {
  margin-top: 20px;
  text-align: center;
}

.cover-container img,
.cover-container video {
  width: 100%;
  border-radius: 20px;
}

#video {
  display: none;
}

.info {
  text-align: center;
}

/*.controls {
  display: flex;
  justify-content: center;
  gap: 30px;
  font-size: 25px;
}*/

input[type="range"] {
  width: 100%;
  margin: 15px 0;
}

.progress {
  height: 100%;
  width: 0%;
  background: #ff0000;
  border-radius: 5px;
  position: relative;
}

/* bolinha arrastável */
.progress::after {
  content: "";
  position: absolute;
  right: 0;
  top: 50%;
  transform: translate(50%, -50%);
  width: 14px;
  height: 14px;
  background: #ff0000;
  border-radius: 50%;
  box-shadow: 0 0 10px #ff0000;
  cursor: pointer;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px;
  position: relative;
  cursor: pointer;
}

/* buffer (cinza) */
.buffer {
  position: absolute;
  height: 100%;
  width: 0%;
  background: rgba(255,255,255,0.4);
  border-radius: 5px;
}

/* progresso */
.progress {
  position: absolute;
  height: 100%;
  width: 0%;
  background: #ff0000;
  border-radius: 5px;
}

/* bolinha */
.progress::after {
  content: "";
  position: absolute;
  right: 0;
  top: 50%;
  transform: translate(50%, -50%);
  width: 14px;
  height: 14px;
  background: #ff0000;
  border-radius: 50%;
  box-shadow: 0 0 10px #ff0000;
}

/* tooltip */
.tooltip {
  position: absolute;
  top: -25px;
  background: #000;
  padding: 3px 6px;
  font-size: 11px;
  border-radius: 5px;
  display: none;
  transform: translateX(-50%);
  pointer-events: none;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 5px;
  color: #aaa;
}

##shuffleBtn.active,
#repeatBtn.active {
  color: #00ffcc;
}

video::-webkit-media-controls {
    display: none !important;
}

footer {
  width: 100%;
  margin: 0 auto;
  text-align: center;
  padding-top: 20px;
  padding-bottom: 20px;
  position: fixed;
  bottom: 0;
  background: #101010;
}

</style>

let current = 0;
let isPlaying = false;
let mode = "audio";
let shuffle = false;
let repeatMode = 0; // 0 = off | 1 = repetir playlist | 2 = repetir 1
let isDragging = false;

const audio = document.getElementById("audio");
const video = document.getElementById("video");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");
const bufferBar = document.getElementById("buffer");
const tooltip = document.getElementById("tooltip");

// BUFFER
function updateBuffer() {
  const media = mode === "audio" ? audio : video;

  if (media.buffered.length > 0) {
    const bufferedEnd = media.buffered.end(media.buffered.length - 1);
    const duration = media.duration;

    if (duration > 0) {
      const percent = (bufferedEnd / duration) * 100;
      bufferBar.style.width = percent + "%";
    }
  }
}

// atualiza buffer em tempo real
audio.addEventListener("progress", updateBuffer);
video.addEventListener("progress", updateBuffer);


// Atualizar barra
function updateProgress() {
  if (isDragging) return;

  const media = mode === "audio" ? audio : video;

  if (!media.duration) return;

  const percent = (media.currentTime / media.duration) * 100;
  progress.style.width = percent + "%";

  currentTimeEl.innerText = formatTime(media.currentTime);
  durationEl.innerText = formatTime(media.duration);
}

// Clique na barra (seek)
progressContainer.addEventListener("click", (e) => {
  const media = mode === "audio" ? audio : video;

  const width = progressContainer.clientWidth;
  const clickX = e.offsetX;

  media.currentTime = (clickX / width) * media.duration;
});

// Atualização em tempo real
audio.addEventListener("timeupdate", updateProgress);
video.addEventListener("timeupdate", updateProgress);

// Formatar tempo
function formatTime(time) {
  if (isNaN(time)) return "0:00";

  const min = Math.floor(time / 60);
  const sec = Math.floor(time % 60);

  return `${min}:${sec < 10 ? "0" + sec : sec}`;
}

//bolinha


// pega posição X (funciona em touch e mouse)
function getX(e) {
  return e.touches ? e.touches[0].clientX : e.clientX;
}

// calcular tempo baseado na posição
function seek(e) {
  const media = mode === "audio" ? audio : video;

  const rect = progressContainer.getBoundingClientRect();
  const x = getX(e) - rect.left;

  let percent = x / rect.width;
  percent = Math.max(0, Math.min(1, percent));

  media.currentTime = percent * media.duration;
}

// iniciar drag
function startDrag(e) {
  isDragging = true;
}

// durante drag
function onDrag(e) {
  if (!isDragging) return;

  const media = mode === "audio" ? audio : video;
  const rect = progressContainer.getBoundingClientRect();
  const x = getX(e) - rect.left;

  let percent = x / rect.width;
  percent = Math.max(0, Math.min(1, percent));

  const previewTime = percent * media.duration;

  // mostra tooltip
  tooltip.style.display = "block";
  tooltip.style.left = x + "px";
  tooltip.innerText = formatTime(previewTime);

  // atualiza posição real
  media.currentTime = previewTime;

  updateProgress();
}

// terminar drag
function stopDrag() {
  isDragging = false;
  tooltip.style.display = "none";
}


// MOUSE
progressContainer.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", onDrag);
document.addEventListener("mouseup", stopDrag);

// TOUCH (mobile)
progressContainer.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", onDrag);
document.addEventListener("touchend", stopDrag);

// ------------------ PLAYER ------------------

function openPlayer(i) {
  current = i;
  document.getElementById("home").classList.remove("active");
  document.getElementById("player").classList.add("active");
  loadMusic();
  playCurrent();
}

function goHome() {
  document.getElementById("player").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function loadMusic() {
  const m = musics[current];

  document.getElementById("title").innerText = m.title;
  document.getElementById("artist").innerText = m.artist;

  cover.src = m.cover;
  audio.src = m.audio;
  video.src = m.video;

  // Reset visual
  isPlaying = false;
  //playBtn.innerText = "▶";
   playBtn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M5 4.623V19.38a1.5 1.5 0 002.26 1.29L22 12 7.26 3.33A1.5 1.5 0 005 4.623Z"></path></svg></div>`;
}

// ------------------ PLAY ------------------

function playPause() {
  if (mode === "audio") {
    toggle(audio, video);
  } else {
    toggle(video, audio);
  }
}

function playCurrent() {
  if (mode === "audio") {
    audio.play();
  } else {
    video.play();
  }
  isPlaying = true;
  //playBtn.innerText = "⏸";
  playBtn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M6.5 3A1.5 1.5 0 005 4.5v15A1.5 1.5 0 006.5 21h2a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 008.5 3h-2Zm9 0A1.5 1.5 0 0014 4.5v15a1.5 1.5 0 001.5 1.5h2a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 0017.5 3h-2Z"></path></svg></div>`;
}

function toggle(activeMedia, otherMedia) {
  if (isPlaying) {
    activeMedia.pause();
    //playBtn.innerText = "▶";
    playBtn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M5 4.623V19.38a1.5 1.5 0 002.26 1.29L22 12 7.26 3.33A1.5 1.5 0 005 4.623Z"></path></svg></div>`;
  } else {
    otherMedia.pause(); // garante que só um toca
    activeMedia.play();
    //playBtn.innerText = "⏸";
  playBtn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M6.5 3A1.5 1.5 0 005 4.5v15A1.5 1.5 0 006.5 21h2a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 008.5 3h-2Zm9 0A1.5 1.5 0 0014 4.5v15a1.5 1.5 0 001.5 1.5h2a1.5 1.5 0 001.5-1.5v-15A1.5 1.5 0 0017.5 3h-2Z"></path></svg></div>`;
  }
  isPlaying = !isPlaying;
}

// ------------------ MODO ------------------

function setMode(type) {
  mode = type;

  audio.pause();
  video.pause();

  if (type === "audio") {
    video.style.display = "none";
    cover.style.display = "block";
  } else {
    video.style.display = "block";
    cover.style.display = "none";
  }

  playCurrent();
}

// ------------------ CONTROLES ------------------

function next() {

  if (repeatMode === 2) {
    loadMusic();
    return playCurrent();
  }

  if (shuffle) {
    let nextIndex;
    do {
      nextIndex = Math.floor(Math.random() * musics.length);
    } while (nextIndex === current && musics.length > 1);

    current = nextIndex;
  } else {
    current++;

    if (current >= musics.length) {
      if (repeatMode === 1) {
        current = 0;
      } else {
        current = musics.length - 1;
        return;
      }
    }
  }

  loadMusic();
  playCurrent();
}

function prev() {
  current = (current - 1 + musics.length) % musics.length;
  loadMusic();
  playCurrent();
}

// ------------------ SHUFFLE ------------------

function toggleShuffle() {
  shuffle = !shuffle;

  const btn = document.getElementById("shuffleBtn");
  btn.classList.toggle("active", shuffle);
}

// ------------------ REPEAT ------------------

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;

  const btn = document.getElementById("repeatBtn");

  btn.classList.remove("active");

  if (repeatMode === 1) {
    btn.classList.add("active");
    //btn.innerText = "🔁"; // repetir tudo
    btn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M21 10a1 1 0 011 1v4a5 5 0 01-5 5H5.414l1.293 1.293a1 1 0 11-1.414 1.414L1.586 19l3.707-3.707a1 1 0 111.414 1.414L5.414 18H17a3 3 0 003-3v-4a1 1 0 011-1Zm-3.707-8.707a1 1 0 011.414 0L22.414 5l-3.707 3.707a1 1 0 11-1.414-1.414L18.586 6H7a3 3 0 00-3 3v4a1 1 0 01-2 0V9a5 5 0 015-5h11.586l-1.293-1.293a1 1 0 010-1.414ZM12 10a2 2 0 110 4 2 2 0 010-4Z"></path></svg></div>`;
  } else if (repeatMode === 2) {
    btn.classList.add("active");
    //btn.innerText = "🔂"; // repetir 1
    btn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M17.293 1.293a1 1 0 000 1.415L18.586 4H7a5 5 0 00-5 5v4a1 1 0 102 0V9a3 3 0 013-3h11.586l-1.293 1.293a1 1 0 001.414 1.415L22.414 5l-3.707-3.707a1 1 0 00-1.414 0ZM13 15V8h-2.5a1 1 0 000 2h.5v5a1 1 0 002 0Zm8-5a1 1 0 00-1 1v4a3 3 0 01-3 3H5.414l1.293-1.292a1.001 1.001 0 00-1.414-1.415L1.586 19l3.707 3.707a1 1 0 101.414-1.413L5.414 20H17a5 5 0 005-5v-4a1 1 0 00-1-1Z"></path></svg></div>`;
  } else {
    //btn.innerText = "🔁"; // desligado
    btn.innerHTML = `<div style="width: 16px; height: 16px; display: block; fill: currentcolor; margin: 0 auto;"><svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" style="pointer-events: none; display: inherit; width: 100%; height: 100%;"><path d="M17.293 1.293a1 1 0 000 1.415L18.586 4H7a5 5 0 00-5 5v4a1 1 0 102 0V9a3 3 0 013-3h11.586l-1.293 1.293a1 1 0 001.414 1.415L22.414 5l-3.707-3.707a1 1 0 00-1.414 0ZM21 10a1 1 0 00-1 1v4a3 3 0 01-3 3H5.414l1.293-1.292a1.001 1.001 0 00-1.414-1.415L1.586 19l3.707 3.707a1 1 0 101.414-1.413L5.414 20H17a5 5 0 005-5v-4a1 1 0 00-1-1Z"></path></svg></div>`;
  }
}

// ------------------ AUTO NEXT ------------------

audio.addEventListener("ended", next);
video.addEventListener("ended", next);


progressContainer.addEventListener("mousemove", (e) => {
  const media = mode === "audio" ? audio : video;
  const rect = progressContainer.getBoundingClientRect();
  const x = e.clientX - rect.left;

  let percent = x / rect.width;
  percent = Math.max(0, Math.min(1, percent));

  const previewTime = percent * media.duration;

  tooltip.style.display = "block";
  tooltip.style.left = x + "px";
  tooltip.innerText = formatTime(previewTime);
});

progressContainer.addEventListener("mouseleave", () => {
  if (!isDragging) tooltip.style.display = "none";
});
